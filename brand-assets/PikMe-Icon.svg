<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b4d1b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="48" fill="url(#bgGradient)"/>

  <!-- Fork (centered) -->
  <g transform="translate(50, 45)">
    <!-- Handle -->
    <rect x="44" y="65" width="8" height="70" fill="#fff" rx="4"/>

    <!-- Prongs -->
    <rect x="18" y="0" width="6" height="65" fill="#fff" rx="3"/>
    <rect x="44" y="0" width="6" height="65" fill="#fff" rx="3"/>
    <rect x="70" y="0" width="6" height="65" fill="#fff" rx="3"/>
  </g>

  <!-- Heart (accent) -->
  <g transform="translate(115, 110)">
    <path d="M0,-12 C-9,-20 -20,-20 -20,-8 C-20,2 -12,14 0,22 C12,14 20,2 20,-8 C20,-20 9,-20 0,-12 Z"
          fill="#FF6B6B" opacity="0.95"/>
  </g>

  <!-- Checkmark (accent) -->
  <g transform="translate(130, 70)">
    <path d="M0,10 L8,18 L24,4" stroke="#4CAF50" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
