<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="splashGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#splashGradient)"/>

  <!-- Top accent circle (decorative) -->
  <circle cx="850" cy="-100" r="300" fill="#2e7d32" opacity="0.08"/>

  <!-- Bottom accent circle (decorative) -->
  <circle cx="200" cy="1800" r="400" fill="#2e7d32" opacity="0.06"/>

  <!-- Logo container -->
  <g transform="translate(270, 600)">
    <!-- Logo background circle -->
    <circle cx="270" cy="270" r="240" fill="#fff" opacity="0.9"/>

    <!-- Fork -->
    <g transform="translate(180, 150)">
      <!-- Handle -->
      <rect x="44" y="65" width="8" height="70" fill="#2e7d32" rx="4"/>
      <!-- Prongs -->
      <rect x="18" y="0" width="6" height="65" fill="#2e7d32" rx="3"/>
      <rect x="44" y="0" width="6" height="65" fill="#2e7d32" rx="3"/>
      <rect x="70" y="0" width="6" height="65" fill="#2e7d32" rx="3"/>
    </g>

    <!-- Heart accent -->
    <g transform="translate(385, 350)">
      <path d="M0,-12 C-9,-20 -20,-20 -20,-8 C-20,2 -12,14 0,22 C12,14 20,2 20,-8 C20,-20 9,-20 0,-12 Z"
            fill="#FF6B6B" opacity="0.9"/>
    </g>

    <!-- Checkmark accent -->
    <g transform="translate(400, 180)">
      <path d="M0,10 L8,18 L24,4" stroke="#4CAF50" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Main headline -->
  <text x="540" y="1100" font-size="56" font-weight="800" text-anchor="middle" fill="#1a1a1a" font-family="Arial, sans-serif">
    PikMe
  </text>

  <!-- Tagline -->
  <text x="540" y="1170" font-size="24" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-weight="500">
    Your Personal Menu Guide
  </text>

  <!-- Description -->
  <text x="540" y="1240" font-size="18" text-anchor="middle" fill="#666" font-family="Arial, sans-serif">
    Personalized food recommendations
  </text>
  <text x="540" y="1270" font-size="18" text-anchor="middle" fill="#666" font-family="Arial, sans-serif">
    just for you
  </text>

  <!-- Loading indicator (animated in app) -->
  <g transform="translate(500, 1400)">
    <circle cx="40" cy="0" r="8" fill="#2e7d32" opacity="0.3"/>
    <circle cx="40" cy="0" r="8" fill="#2e7d32" opacity="0.6"/>
    <circle cx="40" cy="0" r="8" fill="#2e7d32" opacity="1"/>
  </g>

  <!-- Bottom accent -->
  <rect y="1800" width="1080" height="120" fill="#2e7d32" opacity="0.03"/>
</svg>
